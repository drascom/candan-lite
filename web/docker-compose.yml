services:
  mate-web:
    build: .
    restart: unless-stopped
    environment:
      MATE_TOKEN_ENDPOINT: ${MATE_TOKEN_ENDPOINT:-}
      MATE_VOICE_CLIENT_KEY: ${MATE_VOICE_CLIENT_KEY:-}
      MATE_DISCOVERY_ENDPOINT: ${MATE_DISCOVERY_ENDPOINT:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      MATE_PUBLIC_LIVEKIT_URL: ${MATE_PUBLIC_LIVEKIT_URL:-}
      MATE_LIVEKIT_ROOM: ${MATE_LIVEKIT_ROOM:-}
      WEB_USERNAME: ${WEB_USERNAME:?WEB_USERNAME is required}
      WEB_PASSWORD: ${WEB_PASSWORD:?WEB_PASSWORD is required}
    ports:
      - '${WEB_BIND:-127.0.0.1}:${WEB_PORT:-3000}:3000'
